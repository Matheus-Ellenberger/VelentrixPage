<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velentrix - Automação e Marketing</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, .brand-font { font-family: 'Space Grotesk', sans-serif; }
        
        .gradient-text {
            background: linear-gradient(to right, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: move 10s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(20px, -20px) scale(1.1); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Ícones SVG ---
        const Icons = {
            Check: () => <svg className="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>,
            Bot: () => <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>,
            Web: () => <svg className="w-8 h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-9 3-9s-1.343-9-3-9m0 18c-1.657 0-3-9-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>,
            Growth: () => <svg className="w-8 h-8 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>,
            Menu: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        };

        // --- Componentes ---

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            const [isOpen, setIsOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-gray-900/90 backdrop-blur-md border-b border-gray-800 py-4' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <div className="text-2xl font-bold brand-font tracking-tighter flex items-center space-x-2">
                            <div className="w-3 h-3 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full"></div>
                            <span>VELENTRIX</span>
                        </div>
                        
                        {/* Desktop Menu */}
                        <div className="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-300">
                            <a href="#solucoes" className="hover:text-white transition-colors">Soluções</a>
                            <a href="#como-funciona" className="hover:text-white transition-colors">Como Funciona</a>
                            <a href="#planos" className="hover:text-white transition-colors">Planos</a>
                            
                            {/* Este botão levaria para o dashboard criado anteriormente */}
                            <a href="#" className="text-white hover:text-indigo-400 transition-colors">Login</a>
                            <button className="bg-white text-black px-5 py-2 rounded-full font-bold hover:bg-gray-200 transition-colors">
                                Começar Agora
                            </button>
                        </div>

                        {/* Mobile Toggle */}
                        <button className="md:hidden text-white" onClick={() => setIsOpen(!isOpen)}>
                            <Icons.Menu />
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {isOpen && (
                        <div className="md:hidden absolute top-full left-0 w-full bg-gray-900 border-b border-gray-800 p-6 flex flex-col space-y-4 shadow-xl">
                            <a href="#solucoes" className="text-gray-300">Soluções</a>
                            <a href="#planos" className="text-gray-300">Planos</a>
                            <button className="w-full bg-indigo-600 py-3 rounded-lg font-bold">Acessar Painel</button>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
                    {/* Background Blobs */}
                    <div className="blob bg-indigo-600 w-96 h-96 rounded-full top-0 left-0 mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
                    <div className="blob bg-purple-600 w-96 h-96 rounded-full bottom-0 right-0 mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>

                    <div className="container mx-auto px-6 relative z-10 text-center lg:text-left lg:flex items-center">
                        <div className="lg:w-1/2">
                            <div className="inline-block px-3 py-1 mb-6 border border-indigo-500/30 bg-indigo-500/10 rounded-full text-indigo-300 text-xs font-bold uppercase tracking-widest">
                                Revolução no Agendamento
                            </div>
                            <h1 className="text-5xl lg:text-7xl font-bold leading-tight mb-6">
                                Automatize seu negócio. <br />
                                <span className="gradient-text">Escale suas vendas.</span>
                            </h1>
                            <p className="text-gray-400 text-lg lg:text-xl mb-8 leading-relaxed max-w-lg mx-auto lg:mx-0">
                                A Velentrix oferece o ecossistema completo: Chatbot de agendamento inteligente, Site profissional e Estratégias de Marketing. Tudo em um só lugar.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                                <button className="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold transition-all shadow-lg shadow-indigo-500/30">
                                    Criar Conta Grátis
                                </button>
                                <button className="px-8 py-4 border border-gray-700 hover:bg-gray-800 text-white rounded-lg font-bold transition-all flex items-center justify-center gap-2">
                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" /></svg>
                                    Ver Demo
                                </button>
                            </div>
                            <p className="mt-4 text-sm text-gray-500">Sem cartão de crédito necessário • Teste grátis por 7 dias</p>
                        </div>
                        
                        {/* Hero Image / Graphic */}
                        <div className="lg:w-1/2 mt-16 lg:mt-0 relative">
                            <div className="relative rounded-xl border border-gray-700 bg-gray-800/50 backdrop-blur-xl p-4 shadow-2xl transform lg:rotate-3 hover:rotate-0 transition-transform duration-500">
                                {/* Simulação da interface do chat */}
                                <div className="bg-gray-900 rounded-lg p-4 h-96 flex flex-col">
                                    <div className="flex items-center space-x-2 border-b border-gray-800 pb-3 mb-4">
                                        <div className="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-xs font-bold">VE</div>
                                        <div>
                                            <div className="text-sm font-bold">Velentrix Bot</div>
                                            <div className="text-xs text-green-400">Online</div>
                                        </div>
                                    </div>
                                    <div className="space-y-3 flex-1 overflow-hidden">
                                        <div className="bg-gray-800 self-start rounded-lg rounded-tl-none p-3 text-sm max-w-[80%] text-gray-300">
                                            Olá! Gostaria de agendar um horário para esta semana?
                                        </div>
                                        <div className="bg-indigo-600 self-end ml-auto rounded-lg rounded-tr-none p-3 text-sm max-w-[80%]">
                                            Sim, tem vaga para sexta às 15h?
                                        </div>
                                        <div className="bg-gray-800 self-start rounded-lg rounded-tl-none p-3 text-sm max-w-[80%] text-gray-300">
                                            Verificando... 🤖 <br/> Sim! Horário confirmado. Enviei o link de pagamento.
                                        </div>
                                    </div>
                                    <div className="mt-4 pt-3 border-t border-gray-800 flex items-center text-gray-500 text-sm">
                                        Digite uma mensagem...
                                    </div>
                                </div>
                            </div>
                            
                            {/* Floating Stats Card */}
                            <div className="absolute -bottom-10 -left-10 bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-xl flex items-center space-x-4 animate-bounce" style={{animationDuration: '3s'}}>
                                <div className="bg-green-500/20 p-2 rounded-full text-green-400">
                                    <Icons.Growth />
                                </div>
                                <div>
                                    <div className="text-2xl font-bold text-white">+145%</div>
                                    <div className="text-xs text-gray-400">Em agendamentos</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Features = () => {
            const features = [
                {
                    icon: <Icons.Bot />,
                    title: "Chatbot de Agendamento",
                    desc: "Atendimento 24 horas no WhatsApp. O robô responde dúvidas, verifica sua agenda e marca o horário sozinho.",
                    color: "indigo"
                },
                {
                    icon: <Icons.Web />,
                    title: "Sites Profissionais",
                    desc: "Não tem site? Nós criamos uma vitrine online otimizada para converter visitantes em clientes no automático.",
                    color: "purple"
                },
                {
                    icon: <Icons.Growth />,
                    title: "Marketing Digital",
                    desc: "Gestão de tráfego e redes sociais integrada. Atraímos o cliente certo para o seu funil de agendamento.",
                    color: "pink"
                }
            ];

            return (
                <section id="solucoes" className="py-20 bg-gray-900 border-t border-gray-800">
                    <div className="container mx-auto px-6">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-5xl font-bold mb-4">Tudo o que você precisa</h2>
                            <p className="text-gray-400 max-w-2xl mx-auto">
                                Pare de usar várias ferramentas soltas. A Velentrix centraliza sua operação digital.
                            </p>
                        </div>

                        <div className="grid md:grid-cols-3 gap-8">
                            {features.map((feature, idx) => (
                                <div key={idx} className="group p-8 rounded-2xl bg-gray-800 border border-gray-700 hover:border-gray-600 transition-all hover:-translate-y-2">
                                    <div className={`w-14 h-14 rounded-lg bg-${feature.color}-500/10 flex items-center justify-center mb-6 group-hover:bg-${feature.color}-500/20 transition-colors`}>
                                        {feature.icon}
                                    </div>
                                    <h3 className="text-xl font-bold mb-3">{feature.title}</h3>
                                    <p className="text-gray-400 leading-relaxed">
                                        {feature.desc}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Pricing = () => {
            const plans = [
                {
                    name: "Starter",
                    price: "97",
                    period: "/mês",
                    desc: "Para profissionais autônomos iniciando a automação.",
                    features: ["Chatbot WhatsApp Básico", "Agenda Digital", "1 Usuário", "Suporte por Email"],
                    cta: "Começar Starter",
                    popular: false
                },
                {
                    name: "Pro",
                    price: "197",
                    period: "/mês",
                    desc: "A escolha ideal para barbearias e clínicas em crescimento.",
                    features: ["Chatbot com IA Avançada", "Site Institucional Incluso", "3 Usuários", "Lembretes Automáticos", "Suporte Prioritário"],
                    cta: "Assinar Pro",
                    popular: true
                },
                {
                    name: "Agency",
                    price: "497",
                    period: "/mês",
                    desc: "Solução completa com marketing para escalar o negócio.",
                    features: ["Tudo do plano Pro", "Gestão de Tráfego Pago", "Posts Semanais (Social)", "Usuários Ilimitados", "Gerente de Conta"],
                    cta: "Falar com Consultor",
                    popular: false
                }
            ];

            return (
                <section id="planos" className="py-20 relative overflow-hidden">
                    <div className="absolute inset-0 bg-indigo-900/10 skew-y-3 transform origin-bottom-right z-0"></div>
                    
                    <div className="container mx-auto px-6 relative z-10">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-5xl font-bold mb-4">Planos Flexíveis</h2>
                            <p className="text-gray-400">Escolha o pacote ideal para o estágio do seu negócio.</p>
                        </div>

                        <div className="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
                            {plans.map((plan, idx) => (
                                <div key={idx} className={`relative flex flex-col p-8 rounded-2xl border ${plan.popular ? 'bg-gray-800 border-indigo-500 shadow-2xl shadow-indigo-500/20 scale-105 z-10' : 'bg-gray-900 border-gray-800 hover:border-gray-700'}`}>
                                    {plan.popular && (
                                        <div className="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wide">
                                            Mais Popular
                                        </div>
                                    )}
                                    <div className="mb-8">
                                        <h3 className="text-lg font-medium text-gray-300 mb-2">{plan.name}</h3>
                                        <div className="flex items-baseline mb-4">
                                            <span className="text-4xl font-bold text-white">R$ {plan.price}</span>
                                            <span className="text-gray-500 ml-1">{plan.period}</span>
                                        </div>
                                        <p className="text-sm text-gray-400">{plan.desc}</p>
                                    </div>
                                    
                                    <ul className="flex-1 space-y-4 mb-8">
                                        {plan.features.map((feat, i) => (
                                            <li key={i} className="flex items-start space-x-3 text-sm text-gray-300">
                                                <Icons.Check />
                                                <span>{feat}</span>
                                            </li>
                                        ))}
                                    </ul>

                                    <button className={`w-full py-4 rounded-lg font-bold transition-all ${plan.popular ? 'bg-white text-indigo-900 hover:bg-gray-100' : 'bg-gray-800 text-white hover:bg-gray-700 border border-gray-700'}`}>
                                        {plan.cta}
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-900 border-t border-gray-800 pt-16 pb-8 text-sm">
                    <div className="container mx-auto px-6">
                        <div className="grid md:grid-cols-4 gap-12 mb-12">
                            <div className="col-span-1 md:col-span-1">
                                <div className="text-xl font-bold brand-font mb-4 flex items-center space-x-2">
                                    <div className="w-2 h-2 bg-indigo-500 rounded-full"></div>
                                    <span>VELENTRIX</span>
                                </div>
                                <p className="text-gray-500">
                                    Transformando negócios locais com tecnologia de ponta e automação inteligente.
                                </p>
                            </div>
                            <div>
                                <h4 className="font-bold text-white mb-4">Produto</h4>
                                <ul className="space-y-2 text-gray-500">
                                    <li><a href="#" className="hover:text-indigo-400">Chatbot</a></li>
                                    <li><a href="#" className="hover:text-indigo-400">Websites</a></li>
                                    <li><a href="#" className="hover:text-indigo-400">Integrações</a></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-bold text-white mb-4">Empresa</h4>
                                <ul className="space-y-2 text-gray-500">
                                    <li><a href="#" className="hover:text-indigo-400">Sobre nós</a></li>
                                    <li><a href="#" className="hover:text-indigo-400">Contato</a></li>
                                    <li><a href="#" className="hover:text-indigo-400">Blog</a></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-bold text-white mb-4">Legal</h4>
                                <ul className="space-y-2 text-gray-500">
                                    <li><a href="#" className="hover:text-indigo-400">Privacidade</a></li>
                                    <li><a href="#" className="hover:text-indigo-400">Termos de Uso</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="border-t border-gray-800 pt-8 text-center text-gray-600">
                            &copy; 2024 Velentrix Tecnologia. Todos os direitos reservados.
                        </div>
                    </div>
                </footer>
            );
        };

        const App = () => {
            return (
                <div>
                    <Navbar />
                    <Hero />
                    <Features />
                    <Pricing />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
