<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velentrix - Automação e Marketing</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; }
        h1, h2, h3, .brand-font { font-family: 'Space Grotesk', sans-serif; }
        
        /* --- Utilitários da Landing Page (Dark) --- */
        .gradient-text {
            background: linear-gradient(to right, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: move 10s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(20px, -20px) scale(1.1); }
        }
        
        /* --- Utilitários do Dashboard (Light) --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .pattern-dots {
            background-image: radial-gradient(#4b5563 1px, transparent 1px);
            background-size: 10px 10px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- BIBLIOTECA DE ÍCONES (Completa) ---
        const Icons = {
            // Gerais
            Check: () => <svg className="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>,
            Menu: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Logout: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,

            // Landing Page Icons
            Bot: () => <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>,
            Web: () => <svg className="w-8 h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-9 3-9s-1.343-9-3-9m0 18c-1.657 0-3-9-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>,
            Growth: () => <svg className="w-8 h-8 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>,
            
            // Dashboard Icons
            DashHome: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>,
            DashCalendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            DashServices: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>,
            DashWhatsapp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>,
            DashSettings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
        };

        // ==========================================
        //  PARTE 1: DASHBOARD (Restaurado e Completo)
        // ==========================================

        const DashboardHome = () => {
            const stats = [
                { label: 'Agendamentos Hoje', value: '12', color: 'bg-blue-50 text-blue-600' },
                { label: 'Faturamento (Mês)', value: 'R$ 4.250', color: 'bg-green-50 text-green-600' },
                { label: 'Novos Clientes', value: '8', color: 'bg-purple-50 text-purple-600' },
            ];

            return (
                <div className="space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-bold text-gray-800">Visão Geral</h2>
                    
                    {/* Cards de Métricas */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {stats.map((stat, idx) => (
                            <div key={idx} className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <div className="text-sm font-medium text-gray-500 mb-1">{stat.label}</div>
                                <div className={`text-3xl font-bold ${stat.color.split(' ')[1]}`}>{stat.value}</div>
                                <div className="mt-4 flex items-center text-xs text-gray-400">
                                    <span className="text-green-500 font-medium mr-1">↑ 12%</span> vs mês anterior
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Gráfico e Lista de Clientes (RESTAURADO) */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-semibold text-gray-800">Volume de Agendamentos</h3>
                                <select className="text-sm border-gray-200 border rounded-md px-2 py-1 text-gray-500 bg-transparent">
                                    <option>Últimos 7 dias</option>
                                    <option>Este Mês</option>
                                </select>
                            </div>
                            {/* Gráfico CSS Puro */}
                            <div className="h-64 flex items-end justify-between space-x-2 px-4">
                                {[40, 65, 34, 78, 55, 40, 89].map((h, i) => (
                                    <div key={i} className="w-full bg-blue-100 rounded-t-sm relative group cursor-pointer" style={{height: `${h}%`}}>
                                        <div className="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
                                            {h} agend.
                                        </div>
                                        <div className="absolute bottom-0 w-full bg-blue-500 h-0 group-hover:h-full transition-all duration-500 rounded-t-sm opacity-20"></div>
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-between mt-4 text-xs text-gray-400 px-4">
                                <span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span><span>Dom</span>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                            <h3 className="font-semibold text-gray-800 mb-4">Próximos Clientes</h3>
                            <div className="space-y-4">
                                {[
                                    { time: '14:00', name: 'Ana Silva', service: 'Corte + Hidratação' },
                                    { time: '15:30', name: 'Roberto J.', service: 'Barba' },
                                    { time: '16:00', name: 'Carla Dias', service: 'Manicure' },
                                    { time: '17:15', name: 'Pedro H.', service: 'Corte Infantil' },
                                ].map((item, i) => (
                                    <div key={i} className="flex items-start space-x-3 pb-3 border-b border-gray-50 last:border-0 last:pb-0">
                                        <div className="bg-blue-50 text-blue-600 font-bold text-xs px-2 py-1 rounded">
                                            {item.time}
                                        </div>
                                        <div>
                                            <div className="text-sm font-medium text-gray-800">{item.name}</div>
                                            <div className="text-xs text-gray-500">{item.service}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button className="w-full mt-6 py-2 text-sm text-blue-600 font-medium border border-blue-100 rounded-lg hover:bg-blue-50 transition-colors">
                                Ver Agenda Completa
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardServices = () => {
            const [services, setServices] = useState([
                { id: 1, name: 'Corte Masculino', duration: 30, price: 45.00, active: true },
                { id: 2, name: 'Barba', duration: 20, price: 35.00, active: true },
                { id: 3, name: 'Corte + Barba', duration: 50, price: 70.00, active: true },
                { id: 4, name: 'Sobrancelha', duration: 15, price: 20.00, active: false },
            ]);

            return (
                <div className="animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Catálogo de Serviços</h2>
                            <p className="text-gray-500 text-sm">Gerencie o que o seu bot oferece.</p>
                        </div>
                        <button className="flex items-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-lg font-medium transition-colors shadow-lg shadow-indigo-200">
                            <Icons.Plus />
                            <span>Novo Serviço</span>
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {services.map(service => (
                            <div key={service.id} className={`group bg-white p-6 rounded-xl border transition-all ${service.active ? 'border-gray-200 shadow-sm hover:shadow-md hover:border-indigo-200' : 'border-gray-100 opacity-60'}`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${service.active ? 'bg-indigo-50 text-indigo-600' : 'bg-gray-100 text-gray-400'}`}>
                                        <span className="font-bold text-lg">{service.name.charAt(0)}</span>
                                    </div>
                                    <div className={`text-xs px-2 py-1 rounded-full ${service.active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                        {service.active ? 'Ativo' : 'Inativo'}
                                    </div>
                                </div>
                                <h3 className="font-bold text-gray-800 mb-1">{service.name}</h3>
                                <div className="flex items-center space-x-4 text-sm text-gray-500 mb-6">
                                    <div className="flex items-center space-x-1"><Icons.Clock /> <span>{service.duration} min</span></div>
                                    <div className="font-semibold text-gray-800">R$ {service.price.toFixed(2)}</div>
                                </div>
                                <div className="flex space-x-2 border-t pt-4">
                                    <button className="flex-1 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 py-2 rounded transition-colors">Editar</button>
                                    <button className="flex-1 text-sm font-medium text-gray-600 hover:text-red-600 hover:bg-red-50 py-2 rounded transition-colors">Excluir</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const DashboardWhatsapp = () => {
            const [status, setStatus] = useState('disconnected'); // disconnected, connecting, connected

            const handleConnect = () => {
                setStatus('connecting');
                setTimeout(() => setStatus('connected'), 3000);
            };

            return (
                <div className="max-w-4xl mx-auto animate-fade-in">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Conexão WhatsApp</h2>
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col md:flex-row">
                        {/* Lado Esquerdo: Instruções Detalhadas */}
                        <div className="p-8 md:w-1/2">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">Vincule seu número</h3>
                            <p className="text-gray-600 mb-6 text-sm leading-relaxed">
                                Para que o bot responda por você, precisamos conectar ao seu WhatsApp Web.
                            </p>
                            <ol className="space-y-4 text-sm text-gray-700">
                                <li className="flex items-start space-x-3">
                                    <span className="flex-shrink-0 w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold text-xs">1</span>
                                    <span>Abra o WhatsApp e vá em <b>Aparelhos Conectados</b>.</span>
                                </li>
                                <li className="flex items-start space-x-3">
                                    <span className="flex-shrink-0 w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold text-xs">2</span>
                                    <span>Toque em <b>Conectar um aparelho</b> e aponte a câmera.</span>
                                </li>
                            </ol>
                            <div className="mt-8 p-4 bg-blue-50 border border-blue-100 rounded-lg text-sm text-blue-800">
                                💡 Dica: Mantenha seu celular conectado à internet.
                            </div>
                        </div>

                        {/* Lado Direito: Ação */}
                        <div className="bg-gray-50 md:w-1/2 p-8 flex flex-col items-center justify-center border-l border-gray-100">
                            {status === 'disconnected' && (
                                <div className="text-center">
                                    <div className="w-48 h-48 bg-white p-2 mx-auto mb-4 shadow-sm border rounded-lg">
                                        <div className="w-full h-full bg-gray-800 pattern-dots"></div> 
                                    </div>
                                    <button onClick={handleConnect} className="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded-full transition-colors shadow-lg shadow-green-200">Gerar QR Code</button>
                                </div>
                            )}
                            {status === 'connecting' && (
                                <div className="text-center">
                                    <div className="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4"></div>
                                    <p className="text-gray-600 font-medium">Sincronizando com WhatsApp...</p>
                                </div>
                            )}
                            {status === 'connected' && (
                                <div className="text-center animate-fade-in">
                                    <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.Check /></div>
                                    <h3 className="text-xl font-bold text-gray-800 mb-1">Conectado!</h3>
                                    <p className="text-gray-500 text-sm mb-6">Bot ativo no número (41) 99999-9999</p>
                                    <button onClick={() => setStatus('disconnected')} className="text-red-500 text-sm font-medium hover:underline">Desconectar</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardLayout = ({ onLogout }) => {
            const [activeTab, setActiveTab] = useState('dashboard');
            // Menu Completo Restaurado
            const menuItems = [
                { id: 'dashboard', label: 'Dashboard', icon: <Icons.DashHome /> },
                { id: 'agenda', label: 'Agenda', icon: <Icons.DashCalendar /> },
                { id: 'services', label: 'Serviços', icon: <Icons.DashServices /> },
                { id: 'whatsapp', label: 'Conexão WA', icon: <Icons.DashWhatsapp /> },
                { id: 'settings', label: 'Configurações', icon: <Icons.DashSettings /> },
            ];

            return (
                <div className="flex h-screen bg-gray-50 text-gray-800">
                    <aside className="w-64 bg-white border-r border-gray-200 flex flex-col z-10 shadow-lg md:shadow-none">
                        <div className="h-16 flex items-center justify-center border-b border-gray-100">
                            <div className="font-bold text-xl text-indigo-600 tracking-tight flex items-center space-x-2">
                                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-sm">VE</div>
                                <span>ChatFlow</span>
                            </div>
                        </div>
                        <nav className="flex-1 py-6 px-3 space-y-1">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center px-3 space-x-3 py-3 rounded-lg transition-all ${activeTab === item.id ? 'bg-indigo-50 text-indigo-600 font-medium' : 'text-gray-500 hover:bg-gray-100'}`}>
                                    <span>{item.icon}</span><span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-gray-100">
                             <button onClick={onLogout} className="w-full flex items-center justify-center space-x-2 text-red-500 hover:bg-red-50 py-2 rounded-lg transition-colors">
                                <Icons.Logout /> <span>Sair</span>
                             </button>
                        </div>
                    </aside>
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="h-16 bg-white border-b border-gray-200 flex justify-between items-center px-8 shadow-sm">
                            <h1 className="text-xl font-semibold text-gray-800 capitalize">{menuItems.find(m => m.id === activeTab)?.label}</h1>
                            <div className="flex items-center space-x-2 bg-gray-100 px-3 py-1.5 rounded-full">
                                <div className="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-sm">JS</div>
                                <span className="text-sm font-medium text-gray-700 pr-2">João Silva</span>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-8 bg-gray-50">
                            {activeTab === 'dashboard' && <DashboardHome />}
                            {activeTab === 'services' && <DashboardServices />}
                            {activeTab === 'whatsapp' && <DashboardWhatsapp />}
                            {activeTab === 'agenda' && <div className="p-10 text-center text-gray-500">Visualização de Agenda (Em Breve)</div>}
                            {activeTab === 'settings' && <div className="p-10 text-center text-gray-500">Configurações da Conta (Em Breve)</div>}
                        </div>
                    </main>
                </div>
            );
        };

        // ==========================================
        //  PARTE 2: LANDING PAGE (Restaurada e Completa)
        // ==========================================

        const Navbar = ({ onLogin }) => {
            const [scrolled, setScrolled] = useState(false);
            const [isOpen, setIsOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-gray-900/90 backdrop-blur-md border-b border-gray-800 py-4' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <div className="text-2xl font-bold brand-font tracking-tighter flex items-center space-x-2">
                            <div className="w-3 h-3 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full"></div>
                            <span>VELENTRIX</span>
                        </div>
                        <div className="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-300">
                            <a href="#solucoes" className="hover:text-white transition-colors">Soluções</a>
                            <a href="#como-funciona" className="hover:text-white transition-colors">Como Funciona</a>
                            <a href="#planos" className="hover:text-white transition-colors">Planos</a>
                            <button onClick={onLogin} className="text-white hover:text-indigo-400 transition-colors">Login</button>
                            <button onClick={onLogin} className="bg-white text-black px-5 py-2 rounded-full font-bold hover:bg-gray-200 transition-colors">Começar Agora</button>
                        </div>
                        <button className="md:hidden text-white" onClick={() => setIsOpen(!isOpen)}><Icons.Menu /></button>
                    </div>
                    {isOpen && (
                        <div className="md:hidden absolute top-full left-0 w-full bg-gray-900 border-b border-gray-800 p-6 flex flex-col space-y-4 shadow-xl">
                             <a href="#solucoes" className="text-gray-300">Soluções</a>
                             <a href="#planos" className="text-gray-300">Planos</a>
                            <button onClick={onLogin} className="w-full bg-indigo-600 py-3 rounded-lg font-bold">Acessar Painel</button>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = ({ onLogin }) => {
            return (
                <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
                    <div className="blob bg-indigo-600 w-96 h-96 rounded-full top-0 left-0 mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
                    <div className="blob bg-purple-600 w-96 h-96 rounded-full bottom-0 right-0 mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>

                    <div className="container mx-auto px-6 relative z-10 text-center lg:text-left lg:flex items-center">
                        <div className="lg:w-1/2">
                            <div className="inline-block px-3 py-1 mb-6 border border-indigo-500/30 bg-indigo-500/10 rounded-full text-indigo-300 text-xs font-bold uppercase tracking-widest">Revolução no Agendamento</div>
                            <h1 className="text-5xl lg:text-7xl font-bold leading-tight mb-6">Automatize seu negócio. <br /> <span className="gradient-text">Escale suas vendas.</span></h1>
                            <p className="text-gray-400 text-lg lg:text-xl mb-8 leading-relaxed max-w-lg mx-auto lg:mx-0">Chatbot de agendamento, Site profissional e Marketing. Tudo em um só lugar.</p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                                <button onClick={onLogin} className="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold transition-all shadow-lg shadow-indigo-500/30">Criar Conta Grátis</button>
                                <button className="px-8 py-4 border border-gray-700 hover:bg-gray-800 text-white rounded-lg font-bold transition-all flex items-center justify-center gap-2">Ver Demo</button>
                            </div>
                        </div>
                        <div className="lg:w-1/2 mt-16 lg:mt-0 relative">
                            <div className="relative rounded-xl border border-gray-700 bg-gray-800/50 backdrop-blur-xl p-4 shadow-2xl transform lg:rotate-3 hover:rotate-0 transition-transform duration-500">
                                <div className="bg-gray-900 rounded-lg p-4 h-96 flex flex-col">
                                    <div className="flex items-center space-x-2 border-b border-gray-800 pb-3 mb-4">
                                        <div className="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-xs font-bold">VE</div>
                                        <div><div className="text-sm font-bold">Velentrix Bot</div><div className="text-xs text-green-400">Online</div></div>
                                    </div>
                                    <div className="space-y-3 flex-1 overflow-hidden">
                                        <div className="bg-gray-800 self-start rounded-lg rounded-tl-none p-3 text-sm max-w-[80%] text-gray-300">Gostaria de agendar um horário?</div>
                                        <div className="bg-indigo-600 self-end ml-auto rounded-lg rounded-tr-none p-3 text-sm max-w-[80%]">Sexta às 15h?</div>
                                        <div className="bg-gray-800 self-start rounded-lg rounded-tl-none p-3 text-sm max-w-[80%] text-gray-300">Confirmado! 📅</div>
                                    </div>
                                    <div className="mt-4 pt-3 border-t border-gray-800 flex items-center text-gray-500 text-sm">Digite uma mensagem...</div>
                                </div>
                            </div>
                            
                            {/* Card Flutuante Restaurado */}
                            <div className="absolute -bottom-10 -left-10 bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-xl flex items-center space-x-4 animate-bounce" style={{animationDuration: '3s'}}>
                                <div className="bg-green-500/20 p-2 rounded-full text-green-400"><Icons.Growth /></div>
                                <div>
                                    <div className="text-2xl font-bold text-white">+145%</div>
                                    <div className="text-xs text-gray-400">Em agendamentos</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Features = () => {
            const features = [
                { icon: <Icons.Bot />, title: "Chatbot de Agendamento", desc: "O robô responde dúvidas, verifica sua agenda e marca o horário sozinho.", color: "indigo" },
                { icon: <Icons.Web />, title: "Sites Profissionais", desc: "Vitrine online otimizada para converter visitantes em clientes.", color: "purple" },
                { icon: <Icons.Growth />, title: "Marketing Digital", desc: "Gestão de tráfego integrada para atrair os clientes certos.", color: "pink" }
            ];
            return (
                <section id="solucoes" className="py-20 bg-gray-900 border-t border-gray-800">
                    <div className="container mx-auto px-6">
                        <div className="text-center mb-16"><h2 className="text-3xl md:text-5xl font-bold mb-4">Tudo o que você precisa</h2></div>
                        <div className="grid md:grid-cols-3 gap-8">
                            {features.map((feature, idx) => (
                                <div key={idx} className="group p-8 rounded-2xl bg-gray-800 border border-gray-700 hover:border-gray-600 transition-all">
                                    <div className={`w-14 h-14 rounded-lg bg-${feature.color}-500/10 flex items-center justify-center mb-6`}>{feature.icon}</div>
                                    <h3 className="text-xl font-bold mb-3">{feature.title}</h3>
                                    <p className="text-gray-400 leading-relaxed">{feature.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Pricing = ({ onLogin }) => {
            const plans = [
                { name: "Starter", price: "97", features: ["Chatbot Básico", "Agenda Digital", "1 Usuário"], cta: "Começar Starter", popular: false },
                { name: "Pro", price: "197", features: ["Chatbot com IA", "Site Incluso", "3 Usuários", "Lembretes"], cta: "Assinar Pro", popular: true },
                { name: "Agency", price: "497", features: ["Tudo do Pro", "Gestão de Tráfego", "Social Media"], cta: "Falar com Consultor", popular: false }
            ];
            return (
                <section id="planos" className="py-20 relative overflow-hidden">
                    <div className="absolute inset-0 bg-indigo-900/10 skew-y-3 transform origin-bottom-right z-0"></div>
                    <div className="container mx-auto px-6 relative z-10">
                        <div className="text-center mb-16"><h2 className="text-3xl md:text-5xl font-bold mb-4">Planos Flexíveis</h2></div>
                        <div className="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
                            {plans.map((plan, idx) => (
                                <div key={idx} className={`flex flex-col p-8 rounded-2xl border ${plan.popular ? 'bg-gray-800 border-indigo-500 shadow-2xl scale-105 z-10' : 'bg-gray-900 border-gray-800'}`}>
                                    <div className="mb-8"><h3 className="text-lg font-medium text-gray-300 mb-2">{plan.name}</h3><div className="flex items-baseline mb-4"><span className="text-4xl font-bold text-white">R$ {plan.price}</span></div></div>
                                    <ul className="flex-1 space-y-4 mb-8">{plan.features.map((feat, i) => (<li key={i} className="flex items-start space-x-3 text-sm text-gray-300"><Icons.Check /><span>{feat}</span></li>))}</ul>
                                    <button onClick={onLogin} className={`w-full py-4 rounded-lg font-bold transition-all ${plan.popular ? 'bg-white text-indigo-900' : 'bg-gray-800 text-white border border-gray-700'}`}>{plan.cta}</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="bg-gray-900 border-t border-gray-800 pt-16 pb-8 text-sm">
                <div className="container mx-auto px-6">
                    <div className="grid md:grid-cols-4 gap-12 mb-12">
                        <div className="col-span-1 md:col-span-1">
                            <div className="text-xl font-bold brand-font mb-4 flex items-center space-x-2">
                                <div className="w-2 h-2 bg-indigo-500 rounded-full"></div>
                                <span>VELENTRIX</span>
                            </div>
                            <p className="text-gray-500">Transformando negócios locais com tecnologia de ponta e automação inteligente.</p>
                        </div>
                        <div>
                            <h4 className="font-bold text-white mb-4">Produto</h4>
                            <ul className="space-y-2 text-gray-500">
                                <li><a href="#" className="hover:text-indigo-400">Chatbot</a></li>
                                <li><a href="#" className="hover:text-indigo-400">Websites</a></li>
                                <li><a href="#" className="hover:text-indigo-400">Integrações</a></li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-bold text-white mb-4">Empresa</h4>
                            <ul className="space-y-2 text-gray-500">
                                <li><a href="#" className="hover:text-indigo-400">Sobre nós</a></li>
                                <li><a href="#" className="hover:text-indigo-400">Contato</a></li>
                                <li><a href="#" className="hover:text-indigo-400">Blog</a></li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-bold text-white mb-4">Legal</h4>
                            <ul className="space-y-2 text-gray-500">
                                <li><a href="#" className="hover:text-indigo-400">Privacidade</a></li>
                                <li><a href="#" className="hover:text-indigo-400">Termos de Uso</a></li>
                            </ul>
                        </div>
                    </div>
                    <div className="border-t border-gray-800 pt-8 text-center text-gray-600">&copy; 2024 Velentrix Tecnologia. Todos os direitos reservados.</div>
                </div>
            </footer>
        );

        const LandingPage = ({ onLogin }) => (
            <div>
                <Navbar onLogin={onLogin} />
                <Hero onLogin={onLogin} />
                <Features />
                <Pricing onLogin={onLogin} />
                <Footer />
            </div>
        );

        // ==========================================
        //  APP PRINCIPAL (Gerenciador de Rotas)
        // ==========================================

        const App = () => {
            const [currentView, setCurrentView] = useState('landing'); // 'landing' | 'dashboard'

            // Efeito para trocar a classe do Body (Fundo Escuro na Landing, Claro no App)
            useEffect(() => {
                if (currentView === 'dashboard') {
                    document.body.classList.remove('bg-gray-900', 'text-white');
                    document.body.classList.add('bg-gray-50', 'text-gray-900');
                } else {
                    document.body.classList.remove('bg-gray-50', 'text-gray-900');
                    document.body.classList.add('bg-gray-900', 'text-white');
                }
            }, [currentView]);

            return (
                <>
                    {currentView === 'landing' ? (
                        <LandingPage onLogin={() => setCurrentView('dashboard')} />
                    ) : (
                        <DashboardLayout onLogout={() => setCurrentView('landing')} />
                    )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
